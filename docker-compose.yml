version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    env_file: 
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./react-frontend
      args:
        - VITE_API_URL=https://твой-домен.ru/api
    restart: always
    ports:
      - "5173:5173"
