server {
    listen 80;
    server_name ТВОЙ-DOMEN.RU; # Замени на настоящий домен!

    location / {
        proxy_pass http://frontend:5173; # Отдаем фронтенд
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api {
        proxy_pass http://backend:8000/api; # Прокидываем API запросы на Питон
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
